<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Run Run Run - Social</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body data-page="social">
  <header class="topbar">
    <div>
      <h1>🏃 Run Run Run</h1>
      <p>Social</p>
    </div>
    <span class="badge">Page: Social</span>
  </header>

  <main class="container">
    <section class="card hero">
      <h2>Social Module</h2>
      <p class="muted-line">Discover people, follow runners, react to activities, and view your social feed.</p>
      <button id="logoutBtn" class="secondary">Logout</button>
    </section>

    <section class="card">
      <button onclick="window.location.href='/dashboard.html'">← Back to Dashboard</button>
    </section>

    <section class="card social-search-card">
      <h3>🔎 Search Runners</h3>
      <div class="social-row">
        <input id="userSearchInput" type="text" placeholder="Search by name or email" />
        <button id="userSearchBtn">Search</button>
      </div>
      <div id="userSearchResults" class="social-list"></div>
    </section>

    <section class="card social-feed-card">
      <div class="social-row between">
        <h3>📰 Feed Timeline</h3>
        <button id="refreshFeedBtn" class="secondary">Refresh Feed</button>
      </div>
      <div id="socialFeedList" class="social-list"></div>
    </section>

    <section class="card social-notify-card">
      <div class="social-row between">
        <h3>🔔 Notifications</h3>
        <button id="refreshNotificationsBtn" class="secondary">Refresh Notifications</button>
      </div>
      <div id="socialNotificationsList" class="social-list"></div>
    </section>

    <section class="card">
      <pre id="socialOutput"></pre>
    </section>

  </main>

  <script src="/app.js"></script>
</body>
</html>
