spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/strava_dev}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true

server:
  port: ${PORT:8080}

jwt:
  secret: ${JWT_SECRET:9f1a8e6c2d4b7a9f1a8e6c2d4b7a9f1a8e6c2d4b7a9f1a8e6c2d4b7a9f1a8e6c}
  expiration-ms: ${JWT_EXPIRATION_MS:86400000}