services:
  - type: web
    name: runrunrun-backend
    env: docker
    plan: free
    rootDir: .
    dockerfilePath: ./Dockerfile
    autoDeploy: true
    envVars:
      - key: PORT
        value: 10000
      # Set DB_HOST/DB_PORT/DB_NAME/DB_USERNAME/DB_PASSWORD manually
      # in Render Web Service -> Environment (use your existing free Postgres)
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRATION_MS
        value: 86400000
