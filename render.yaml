services:
  - type: web
    name: runrunrun-backend
    env: docker
    plan: free
    rootDir: .
    dockerfilePath: ./Dockerfile
    autoDeploy: true
    envVars:
      - key: PORT
        value: 10000
      - key: DB_URL
        fromDatabase:
          name: runrunrun-db
          property: connectionString
      - key: DB_USERNAME
        fromDatabase:
          name: runrunrun-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: runrunrun-db
          property: password
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRATION_MS
        value: 86400000

databases:
  - name: runrunrun-db
    plan: free
